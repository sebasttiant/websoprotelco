name: websoprotelco

services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-websoprotelco}
      POSTGRES_USER: ${POSTGRES_USER:-local_dev_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_dev_password_change_me}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot deploy step: runs to completion, then `web` starts. Concurrent runs are
  # serialised by a PostgreSQL advisory lock, so this stays safe with multiple replicas.
  migrate:
    build:
      context: .
      target: migrator
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-local_dev_user}:${POSTGRES_PASSWORD:-local_dev_password_change_me}@db:5432/${POSTGRES_DB:-websoprotelco}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8585
      DATABASE_URL: postgresql://${POSTGRES_USER:-local_dev_user}:${POSTGRES_PASSWORD:-local_dev_password_change_me}@db:5432/${POSTGRES_DB:-websoprotelco}
    ports:
      - "${WEB_HOST:-127.0.0.1}:${WEB_PORT:-8585}:8585"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - uploads-data:/app/public/uploads

volumes:
  postgres-data:
  uploads-data:
