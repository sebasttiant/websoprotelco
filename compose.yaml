name: websoprotelco

# The single compose file for this project. Docker resolves compose.yaml ahead of
# docker-compose.yml, so a second file would be silently ignored — which is exactly what
# happened before: deploy.sh asked for services that only existed in the shadowed file.
#
# Full flow (or just run ./deploy.sh):
#   docker compose build migrate seed web
#   docker compose up -d db
#   docker compose run --rm migrate
#   docker compose run --rm seed
#   docker compose up -d web

services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-websoprotelco}
      POSTGRES_USER: ${POSTGRES_USER:-local_dev_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_dev_password_change_me}
    # Bound to loopback so `pnpm dev` on the host can reach the database.
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot deploy step: runs to completion, then `web` starts. Concurrent runs are
  # serialised by a PostgreSQL advisory lock, so this stays safe with multiple replicas.
  migrate:
    build:
      context: .
      target: migrator
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-local_dev_user}:${POSTGRES_PASSWORD:-local_dev_password_change_me}@db:5432/${POSTGRES_DB:-websoprotelco}
      DATABASE_SSL: ${DATABASE_SSL:-disable}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-5}
    depends_on:
      db:
        condition: service_healthy

  # Development tooling container. Two jobs, and the difference matters:
  #
  #   docker compose run --rm seed                       -> the DEV accounts (default CMD)
  #   docker compose run --rm seed pnpm db:create-admin  -> a real admin from ADMIN_* in .env
  #
  # db/seeds/001-users.ts carries committed credentials, and this repository is public. It
  # refuses to run when NODE_ENV=production, so NODE_ENV is passed through here rather than
  # left unset: setting NODE_ENV=production in a server's .env makes that guard actually fire.
  # deploy.sh never invokes the seed — it creates the admin from ADMIN_EMAIL/ADMIN_PASSWORD,
  # which live only in the server's .env and are never committed.
  #
  # The "tools" profile keeps this out of `docker compose up`.
  seed:
    profiles: ["tools"]
    build:
      context: .
      target: seed
    restart: "no"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-local_dev_user}:${POSTGRES_PASSWORD:-local_dev_password_change_me}@db:5432/${POSTGRES_DB:-websoprotelco}
      DATABASE_SSL: ${DATABASE_SSL:-disable}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-5}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8585
      # No default on purpose; `:-local` would re-create the silent misconfiguration the
      # runtime guard prevents. Contract: tests/deploy/compose-contract.sh.
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:?STORAGE_PROVIDER is required (set STORAGE_PROVIDER=local)}
      DATABASE_URL: postgresql://${POSTGRES_USER:-local_dev_user}:${POSTGRES_PASSWORD:-local_dev_password_change_me}@db:5432/${POSTGRES_DB:-websoprotelco}
      DATABASE_SSL: ${DATABASE_SSL:-disable}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      # Empty by default (cookie stays Secure). Set SESSION_COOKIE_SECURE=false in .env only to
      # log in over plain HTTP (no TLS yet); put it back once Cloudflare/HTTPS is in front.
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-}
    # 127.0.0.1 by default: a VPS must opt in with WEB_HOST=0.0.0.0, as .env.example spells out.
    ports:
      - "${WEB_HOST:-127.0.0.1}:${WEB_PORT:-8585}:8585"
    # Deliberately not dependent on `seed`: the site works without the default accounts.
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # Both paths hold user-uploaded files and MUST be volumes. Without documents-data,
    # public/documents lives on the container's writable layer and every `up --build`
    # destroys it. deploy.sh now aborts if legacy documents still live only in that layer;
    # perform the one-time move with docs/operations/legacy-documents-migration.md first.
    volumes:
      - uploads-data:/app/public/uploads
      - documents-data:/app/public/documents

volumes:
  postgres-data:
  uploads-data:
  documents-data:
